name: Release

# Fires when a semver tag like 1.5.0 is pushed (commitizen's tag_format = "$version").
# Builds the distribution, creates a GitHub Release whose body is the matching
# CHANGELOG.md section, then publishes to PyPI with the existing token secret.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write  # needed to create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -

      - name: Verify pyproject version matches the tag
        run: |
          pyproject_version=$(poetry version --short)
          if [ "$pyproject_version" != "${GITHUB_REF_NAME}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match pyproject version ${pyproject_version}." >&2
            exit 1
          fi

      - name: Install dependencies
        run: poetry install

      - name: Build distribution
        run: poetry build

      - name: Extract release notes from CHANGELOG.md
        # Print the section that starts with "## <tag>" (cz writes "## 1.5.0 (date)"),
        # stop at the next "## " heading. Header line itself is dropped — GitHub
        # already shows the tag as the release title.
        run: |
          awk -v ver="${GITHUB_REF_NAME}" '
            $0 ~ "^## " ver "( |$)" { p=1; next }
            p && /^## / { exit }
            p { print }
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "::warning::No CHANGELOG.md section found for ${GITHUB_REF_NAME}; release body will be empty."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          draft: false
          prerelease: false

      - name: Publish to PyPI
        run: poetry publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}
